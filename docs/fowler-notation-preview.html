<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Martin Fowler - Cardinality Logic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; padding: 40px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #1d1d1f; }
        .subtitle { font-size: 14px; color: #86868b; margin-bottom: 10px; }
        .canvas { position: relative; width: 800px; height: 600px; background: white; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); overflow: hidden; background: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.04) 1px, transparent 0); background-size: 20px 20px; }
    </style>
</head>
<body>
    <h1>Cardinality Marker - All Crow Feet Same Width</h1>

    <div class="canvas">
        <svg width="100%" height="100%" style="position:absolute;">
            <text x="50" y="40" font-size="14" font-weight="600" fill="#1d1d1f">All crow feet = 15px wide:</text>

            <!-- 1. EXACTLY ONE [1,1] -->
            <rect x="70" y="60" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="85" y="88" font-size="12" fill="#1d1d1f">Order</text>
            <rect x="350" y="60" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="365" y="88" font-size="12" fill="#1d1d1f">LineItem</text>
            <line x1="160" y1="82" x2="350" y2="82" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="75" x2="335" y2="89" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="345" y1="75" x2="345" y2="89" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="450" y="87" font-size="12" font-weight="500" fill="#1d1d1f">[1,1]</text>

            <!-- 2. OPTIONAL [0,1] -->
            <rect x="70" y="130" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="85" y="158" font-size="12" fill="#1d1d1f">Order</text>
            <rect x="350" y="130" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="358" y="158" font-size="12" fill="#1d1d1f">Customer</text>
            <line x1="160" y1="152" x2="350" y2="152" stroke="#1d1d1f" stroke-width="1.5"/>
            <circle cx="330" cy="152" r="5" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="342" y1="145" x2="342" y2="159" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="450" y="157" font-size="12" font-weight="500" fill="#1d1d1f">[0,1]</text>

            <!-- 3. ONE OR MANY [1,*] - Reference: 15px wide (x335 to x350) -->
            <rect x="70" y="200" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="85" y="228" font-size="12" fill="#1d1d1f">Order</text>
            <rect x="350" y="200" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="365" y="228" font-size="12" fill="#1d1d1f">LineItem</text>
            <line x1="160" y1="222" x2="350" y2="222" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="215" x2="335" y2="229" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="222" x2="350" y2="215" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="222" x2="350" y2="229" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="222" x2="345" y2="222" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="450" y="227" font-size="12" font-weight="500" fill="#1d1d1f">[1,*] - reference (15px)</text>

            <!-- 4. ZERO OR MANY [0,*] - SAME 15px width crow foot as [1,*] -->
            <rect x="70" y="270" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="88" y="298" font-size="12" fill="#1d1d1f">Person</text>
            <rect x="350" y="270" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="365" y="298" font-size="12" fill="#1d1d1f">Order</text>
            <line x1="160" y1="292" x2="350" y2="292" stroke="#1d1d1f" stroke-width="1.5"/>
            <!-- Circle right edge at x=335 (center x=330, radius 5) -->
            <circle cx="330" cy="292" r="5" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <!-- Crow foot: SAME WIDTH as [1,*] - x335 to x350 = 15px -->
            <line x1="335" y1="292" x2="350" y2="285" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="292" x2="350" y2="299" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="292" x2="345" y2="292" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="450" y="297" font-size="12" font-weight="500" fill="#1d1d1f">[0,*] - same width</text>

            <!-- 5. 2 or MORE [2,*] - SAME 15px width crow foot, tip at box edge -->
            <rect x="70" y="340" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="82" y="368" font-size="12" fill="#1d1d1f">Product</text>
            <rect x="350" y="340" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="360" y="368" font-size="12" fill="#1d1d1f">Category</text>
            <line x1="160" y1="362" x2="350" y2="362" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="327" y="367" font-size="11" font-weight="600" fill="#1d1d1f">2</text>
            <!-- Crow foot: tips at EXACTLY x350, "2" centered above circle position -->
            <line x1="335" y1="362" x2="350" y2="355" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="362" x2="350" y2="369" stroke="#1d1d1f" stroke-width="1.5"/>
            <line x1="335" y1="362" x2="345" y2="362" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="450" y="367" font-size="12" font-weight="500" fill="#1d1d1f">[2,*] - same width</text>

            <!-- 6. LITERAL RANGE [2,5] -->
            <rect x="70" y="410" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="85" y="438" font-size="12" fill="#1d1d1f">Order</text>
            <rect x="350" y="410" width="90" height="45" fill="white" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="365" y="438" font-size="12" fill="#1d1d1f">Detail</text>
            <line x1="160" y1="432" x2="350" y2="432" stroke="#1d1d1f" stroke-width="1.5"/>
            <text x="320" y="427" font-size="11" font-weight="500" fill="#1d1d1f">2..5</text>
        </svg>
    </div>
</body>
</html>
